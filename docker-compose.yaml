services:
  web:
    build: .
    container_name: bluethink_web
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    depends_on:
      - redis

  celery_worker:
    build: .
    container_name: bluethink_celery_worker
    command: celery -A config worker --loglevel=info
    volumes:
      - .:/app
      - media_data:/app/media
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: bluethink_redis
    ports:
      - "6379:6379"

volumes:
  media_data:
  static_data:
